# Keep the custom config minimal so later compose overrides can extend the setup.
# The container entrypoint owns the data directory location; overriding it breaks
# the Postgres 18 image because initialization now happens under a versioned path.

listen_addresses = '*'
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
