services:
  postgres:
    volumes:
      - ./docker/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/primary/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh:ro

  pg-replica-streaming:
    image: postgres:18.3-alpine
    restart: unless-stopped
    entrypoint: ["bash", "/etc/postgresql/init-replica.sh"]
    ports:
      - "5433:5432"
    volumes:
      - pgreplicadata:/var/lib/postgresql/data
      - ./docker/replica-streaming/init-replica.sh:/etc/postgresql/init-replica.sh:ro
      - ./docker/replica-streaming/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pgnet

volumes:
  pgreplicadata:
